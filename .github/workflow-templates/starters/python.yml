# Starter workflow for Python repos.
# Copy to .github/workflows/ci-guards.yml and adjust as needed.

name: CI Guards (Python)

on:
  pull_request:
  push:
    branches: [main]

jobs:
  guards:
    uses: ./.github/workflow-templates/ci-guards.reusable.yml
    with:
      phase: all
      config: ci-guards.yaml
      languages: "python"
      file-glob: "*.py"
      rule-set: "python-default"
      fail-on-violation: true