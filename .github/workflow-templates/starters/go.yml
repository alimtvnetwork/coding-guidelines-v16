# Starter workflow for Go repos.
# Copy to .github/workflows/ci-guards.yml and adjust as needed.

name: CI Guards (Go)

on:
  pull_request:
  push:
    branches: [main]

jobs:
  guards:
    uses: ./.github/workflow-templates/ci-guards.reusable.yml
    with:
      phase: all
      config: ci-guards.yaml
      languages: "go"
      file-glob: "*.go"
      rule-set: "go-default"
      fail-on-violation: true